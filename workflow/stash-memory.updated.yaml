      - the helper returns both child and parent choice sets
      - both choice sets include CreateNew defaults
      - discovered UseExisting VHDX entries are returned
      - patches/iscsi-discovery-fix.patch removes a premature sort stage while preserving choice object creation
      - the safe checkpoint is now implementation-present and verification-pending, not the original missing-function red boundary
    current_slice_scope:
      includes:
        - existing child VHDX candidates under \\10.100.0.10\lab\virtual hdds frontends
        - existing parent VHDX candidates under \\10.100.0.10\lab\virtual hdds
        - a default create-new option for both child and parent choice sets
      excludes:
        - folder creation
        - VHDX file creation
        - iSCSI target publication

qa_reading:
  tags:
    - needs-observation
    - hypothesis
    - risk-identified
  commentary: >
    The discovery helper is present in the summarized codebase, and a small
    follow-up patch already adjusts its enumeration pipeline. The remaining
    uncertainty is no longer missing implementation; it is whether the latest
    helper and test file are green together on the real tree.
  next_steps:
    - run the dedicated iSCSI Pester file against the current branch state
    - confirm Get-HqLabVhdDiscoveryChoices still returns the expected create-new defaults and discovered VHDX entries after the fix patch
    - keep the next green slice limited to discovery validation or a dedicated execution switch, not target publication
  quality_risks:
    - real share enumeration may expose folder-layout or naming variations beyond the first discovery test
    - the Windows iSCSI target support boundary for publishing a differencing child disk is still unverified
    - operator selection is not yet implemented; only discovery output is defined

blockers:
  - no blocker prevents the discovery helper itself
  - the iSCSI publication path is intentionally split into a separate upcoming tool and still needs its own implementation plan
  - the later iSCSI publication path still depends on validating the Windows differencing-disk support boundary

open_questions:
  resolved:
    - use V:\VHDs\disks\sharedisk.vhdx as the ShareDrive VHD path
    - guest activation consumes a host-generated metadata module instead of relying only on guest-visible heuristics
    - manual VM selection replaces auto-detection as the preferred host workflow
    - increment 3 ends at dedup execution, missing-feature handling, and execution-mode guarding
    - increment 4 will use HQ-local groups plus HQ\svc_lab instead of abstract domain groups or Everyone
    - WSL2 access from P50 will be modeled through HQ-authenticated SMB sessions rather than direct P50\... principals
  open:
    - should the next slice stop at validation of the discovery helper, or immediately add the separate execution switch once the dedicated iSCSI test file is green?

