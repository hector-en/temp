stakeholder_feedback:
  latest_feedback:
    - when the user says save here or equivalent, the agent suite must record the real progress state and create a stash before ending the session
    - comment-first drift should be corrected before widening the next slice
    - AGENTS.md should bootstrap the repo workflow automatically for non-trivial work so the user does not need to keep restating it
  latest_progress_reports:
    - increment 4 now includes ACL helper code, HQ principal-state backup/export, required identity restore, and green lab-aligned tests
    - identity restore now runs only when -RunIdentityRestore is set, and ACL application now runs inside activation after the storage work is finished
    - saved principal state now produces a cleanup plan for principals that were absent before restore work ran
    - saved principal state now produces a cleanup plan for both added group links and added principals
    - -RunIdentityCleanup now executes planned group-link cleanup through the guest wrapper
    - -RunIdentityRestore now works as a standalone guest action and prints live restore and cleanup status output
    - -RunIdentityCleanup now keeps the whole flow in one command by showing planned removals and asking for confirmed user and group deletion after link cleanup
    - increment 4 is closed out at commit daf202d and tagged as configure-hq-increment-4
    - branch bugfix now carries commit 94316ef to harden local HQ identity restore against hidden local SAM principals that LocalAccounts cmdlets do not surface reliably
    - the current bugfix working slice hardens -RunIdentityCleanup so already-missing local users and groups are treated as already removed when Windows returns a direct ...was not found delete error
    - guest reruns confirmed that -RunIdentityCleanup no longer repeats phantom group removals, and the current working slice adds the remaining restore fixes for refreshed drive letters, hidden-principal duplicate creates, and restore-time hidden-local-SAM verification
    - bugfix has been merged into dev through merge commit b2b64d1
    - increment 5 has resumed with SMB share provisioning after ACL setup, and app/tests/configure_hq.Tests.ps1 is green with 79 passing tests
    - commit 5e6fb94 saves the legacy SMB publication alignment, the repo-bootstrap move into AGENTS.md, and the configure_hq doc move into app/docs
    - the code summary now shows the iSCSI discovery helper implemented, with a follow-up helper fix recorded in patches/iscsi-discovery-fix.patch; the remaining work is live verification on the current tree

