    stash_ref: ""
    qa_tags: ["ready-for-merge"]
    qa_commentary: "Increment 3 is green through dedup target selection, dedup execution wiring, missing-feature handling, and host/guest execution guarding. It is ready to close and hand off to increment 4."
    qa_next_steps:
      - "Tag and preserve increment 3."
      - "Start increment 4 at the ACL application boundary."
    quality_risks:
      - "Dedup feature installation may still require reboot or manual verification on some guests."
      - "ACL and SMB behavior are still not implemented."
    blockers: []
    open_questions:
      - "Resolved: increment 3 ends at dedup execution, missing-feature handling, and execution-mode guarding."
  - id: "increment-4"
    status: "complete"
    summary: "ACL helpers, HQ principal-state backup, standalone and optional identity restore, and the full RunIdentityCleanup confirmation flow are implemented and tested."
    owner: "powershell-pair-coder"
    tag: "configure-hq-increment-4"
    stash_ref: "stash@{0}"
    checkpoint_ref: "daf202d"
    qa_tags: ["ready-for-merge", "risk-accepted"]
    qa_commentary: "Increment 4 is green on the ACL helpers, principal-state export, standalone and optional identity restore, ACL application inside activation, saved-state cleanup planning, and the full RunIdentityCleanup confirmation flow. The direction matches the lab topology: HQ-local principals, group-based human access, and HQ-authenticated SMB sessions for P50 and WSL2. The increment is closed out in commit daf202d and tagged as configure-hq-increment-4."
    qa_next_steps:
      - "Start increment 5 at the SMB publishing boundary."
      - "Keep the increment-4 stash entries only as historical lineage."
    quality_risks:
      - "The VHDX parent/differencing chain over SMB is still an accepted lab risk."
      - "Guest-local identity mirroring is convenient but remains less robust than a shared domain or trust model."
      - "The identity revert path still depends on an operator confirmation flow and is not a one-shot automatic revert."
      - "SMB behavior remains out of scope and unimplemented in code."
    blockers: []
    open_questions:
      - "Resolved: increment 4 will use HQ-local groups plus HQ\\svc_lab instead of abstract domain groups or Everyone."
      - "Resolved: WSL2 access from P50 will be modeled through HQ-authenticated SMB sessions rather than direct P50 principals."
  - id: "increment-5"
    status: "complete"
    summary: "SMB share provisioning has resumed from the managed-folder contract and now creates or verifies shares after ACL setup."
    owner: "powershell-pair-coder"
    tag: ""
    stash_ref: ""
    checkpoint_ref: "5e6fb94"
    qa_tags: ["ready-for-merge"]
    qa_commentary: "Increment 5 is complete on dev for the SMB publication boundary. Commit 5e6fb94 saves the first SMB publication slice plus the repo-bootstrap cleanup, and the SMB path has now been verified on the guest. The iSCSI design note remains a separate upcoming tool boundary rather than part of the finished SMB acceptance scope."
    qa_next_steps:
      - "Save and preserve the SMB closeout state."
      - "Start a separate iSCSI tool at the Lab VHDX discovery boundary."
      - "Validate the Windows support boundary for publishing the writable child disk through iSCSI before any target-provisioning code begins."
    quality_risks:
      - "SMB cmdlet behavior can vary across guest editions and installed feature sets."
      - "The VHDX parent/differencing chain over SMB remains an accepted lab risk."
      - "Windows iSCSI target support for publishing the differencing child disk is not yet verified."
    blockers: []
    open_questions:
      - "Resolved for SMB closeout: the current tool stops at the verified SMB publication boundary."
      - "Open for the new iSCSI tool: which Lab-backed child VHDX is the safe publication candidate?"
  - id: "iscsi-tool-lab-vhdx-discovery"
    status: "complete"
    summary: "Get-HqLabVhdDiscoveryChoices returns child and parent VHDX choice sets with create-new defaults, and the standalone discovery switch is already present and verified."
    owner: "powershell-pair-coder"
    tag: ""
    stash_ref: "stash@{0}"
    checkpoint_ref: "5e6fb94"
    qa_tags: ["ready-for-merge", "risk-identified"]
    qa_commentary: "The discovery-only iSCSI slice is green. Get-HqLabVhdDiscoveryChoices is implemented, the dedicated Pester file passes on the current tree, and -DiscoverLabVhdChoices already exposes the standalone non-destructive execution path."
    qa_next_steps:
      - "Preserve the verified discovery checkpoint."
      - "Start the next iSCSI slice at operator selection."
      - "Keep creation and iSCSI publication out of scope until the Windows support boundary is validated."
    quality_risks:
      - "Real share enumeration may expose folder-layout differences beyond the first red test."
      - "Windows iSCSI target support for publishing the differencing child disk is still not verified."
      - "Interactive operator selection is still out of scope for the completed discovery slice."
    blockers: []
    open_questions:
      - "Which Lab-backed child VHDX should become the safe publication candidate after discovery?"
      - "What naming rules should the create-new defaults use?"
      - "The standalone discovery switch is resolved and already present."
  - id: "iscsi-tool-lab-vhdx-operator-selection"
    status: "superseded"
    summary: "Flat discovery and early operator selection work exposed that current iSCSI publication should stay child-first while parent discovery must follow each child disk's actual lineage before any later create-new parent selection flow is finalized."
    owner: "powershell-pair-coder"
    tag: ""
    stash_ref: "stash@{0}"
    checkpoint_ref: "5e6fb94"
    qa_tags: ["risk-identified", "test-gap"]
    qa_commentary: "Selection work should pause until discovery returns child-first lineage-aware information and parent selection is deferred to the later new-child creation flow."
    qa_next_steps:
      - "Introduce a failing test for child-first discovery with per-child parent-chain context."
      - "Refactor discovery before widening selection UX."
    quality_risks:
      - "Flat parent enumeration may surface unrelated VHDX files that are not the child disk's true parent chain."
    blockers: []
    open_questions:
      - "Which Windows-local metadata path should read the parent link when Hyper-V cmdlets are limited or unavailable?"
      - "Parent selection should stay out of the current iSCSI publication slice until the later new-child creation flow."
  - id: "iscsi-parent-chain-discovery"
    status: "active"
    summary: "Discover child VHDX candidates first, then attach each existing child disk to its linked parent chain until the final base parent is reached."
    owner: "powershell-pair-coder"
    tag: ""
    stash_ref: "stash@{0}"
    checkpoint_ref: "5e6fb94"
    qa_tags: ["needs-observation", "risk-identified", "test-gap"]
    qa_commentary: "The real bug is in the discovery model, not just the selection layer, and the current iSCSI publication step should remain child-first. Live output now confirms child-only discovery, but parent-chain lookup is still blocked for P50\\labuser and currently falls back to ParentChainStatus = Unavailable."
    qa_next_steps:
      - "Record the blocked lineage-inspection behavior in tests and workflow state."
      - "Capture or surface the actual per-child inspection error when parent-chain lookup is unavailable."
      - "Keep creation and iSCSI publication out of scope."
    quality_risks:
      - "The parent link may need VHD metadata inspection instead of path heuristics."
      - "Real share trees may contain unrelated parent candidates that should not appear in a child disk's lineage."
      - "The console output may become noisy unless parent-chain context stays attached to child choices rather than reviving a flat parent-choice list."
    blockers: []
    open_questions:
      - "Should the child-first output show the full parent-chain path list inline on each choice row, or summarize it there and print the detailed chain below?"
      - "Which host-side command or API is the most reliable source of parent-link metadata?"
hotfix_tracks:
  - id: "bugfix-local-sam-identity-fallback"
    status: "merged"
    branch: "bugfix"
    checkpoint_ref: "3758619"
    base_checkpoint_ref: "daf202d"
    summary: "Harden HQ-local identity restore against hidden local SAM principals that LocalAccounts cmdlets fail to discover or manage reliably."
    qa_tags: ["ready-for-merge"]
    qa_commentary: "The bugfix track was completed and merged into dev. It covers ADSI-backed local SAM principal discovery, collision detection, membership enumeration, membership add/remove fallbacks, metadata-import guarding for identity-only guest flows, tolerant cleanup handling when local principal deletion reports `was not found`, refreshed drive-letter discovery after online transitions, duplicate-create tolerance for hidden existing principals, and restore-time hidden-local-SAM verification."
    qa_next_steps:
      - "Use dev as the continuation branch."
      - "Resume increment 5 at the SMB publishing boundary."
    quality_risks:
      - "Hidden local SAM membership behavior may still vary across guest environments."
      - "The VHDX parent/differencing chain over SMB remains an accepted lab risk outside this hotfix."
    blockers: []
    open_questions:
      - "Resolved in guest reruns: cleanup no longer repeats phantom local group removals after deletion."
      - "Resolved in guest reruns and the current working slice: post-activation drive-letter refresh and restore verification now address the latest hidden-principal restore failures."
