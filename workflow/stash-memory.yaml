schema_version: 1
project: configure-hq
human_status_file: "workflow/authoritative-status.md"
global:
  current_focus: "iscsi-tool-lab-vhdx-operator-selection"
  overall_status: "active"
  last_reviewed: "2026-04-13"
  active_branch: "feat/iscsi"
  active_checkpoint: "5e6fb94"
  stakeholder_feedback:
    - "When the user says save here or equivalent, record the real progress state and create a stash before ending the session."
    - "Comment-first drift should be corrected before widening the next slice."
    - "Workflow artifacts should reflect live bugfix work before the next feature slice starts."
    - "AGENTS.md should bootstrap the repo workflow automatically for non-trivial work."
  resume_strategy: "time-series recomposition"
  resume_policy:
    - "Treat stash history as an experiment timeline, not just a restore stack."
    - "On resume, decide between single-stash resume and recomposed resume."
    - "Prefer the strongest next code state, even if it combines lessons from multiple stashes."
    - "Keep useful historical stashes until they are clearly superseded."
qa_state_catalog:
  exploring:
    commentary: "Understanding is still forming."
    next_steps: "Inspect more code, tests, or real behavior."
  needs-criteria:
    commentary: "Acceptance criteria are not yet strong enough."
    next_steps: "Define measurable expected behavior before coding further."
  needs-observation:
    commentary: "Real system behavior has not been observed yet."
    next_steps: "Run the relevant command or inspect the environment."
  hypothesis:
    commentary: "The current approach depends on an unverified assumption."
    next_steps: "Create the cheapest validation step."
  risk-identified:
    commentary: "A concrete delivery or behavior risk is present."
    next_steps: "Mitigate or explicitly accept the risk."
  regression-risk:
    commentary: "Current changes may break working behavior."
    next_steps: "Add or strengthen tests around the affected path."
  test-gap:
    commentary: "Important behavior is not covered by tests."
    next_steps: "Add a failing test before more implementation."
  stakeholder-review:
    commentary: "The code direction needs stakeholder confirmation."
    next_steps: "Ask the narrowest question that resolves direction."
  ready-for-red:
    commentary: "The next behavior slice is clear enough to test."
    next_steps: "Write the next failing test."
  ready-for-green:
    commentary: "The failing test and implementation boundary are clear."
    next_steps: "Apply the minimal code change."
  ready-for-merge:
    commentary: "The increment appears coherent and reviewable."
    next_steps: "Do final verification and integrate."
  risk-accepted:
    commentary: "A known risk remains and is being carried intentionally."
    next_steps: "Record the risk and revisit later."
